<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="scan-me.png">
    <title>Scan Chainer</title>

    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <input id="scan-input" type="text" placeholder="Scan here..." autofocus>

    <div class="result-container">
        <button id="copy-button">Copy to Clipboard</button>
        <input id="input-delimiter" type="text">
        <span>Result:</span>
        <span id="result-text">Scanned Data</span>
    </div>

    <table id="data-table">
        <thead>
            <tr>
                <th>Index</th>
                <th>V Index</th>
                <th>ID Number</th>
                <th>Raw Scan</th>
            </tr>
        </thead>
        <tbody id="result-table-data">
            <!-- Data rows will be inserted here -->
        </tbody>
    </table>
</body>

</html>
