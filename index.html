<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/scan-me.png">
    <title>Scan Me</title>

    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>

    <header>

    </header>

    <main>
        <div class="app">
            <!-- Scan Input Section -->
            <div>
                <div class="header">
                    <input id="scan-input" type="text" placeholder="Scan here..." autofocus>
                </div>

                <div class="result-container menu">
                    <button id="copy-button">Copy to Clipboard</button>
                    <input id="input-delimiter" type="text" class="input-delimiter">
                    <span>Result:</span>
                    <span id="result-text" class="text-truncate">Scanned Data</span>
                </div>

                <table id="data-table" class="content">
                    <thead>
                        <tr>
                            <th>Index</th>
                            <th>V Index</th>
                            <th>ID Number</th>
                            <th>Found?</th>
                            <th>Raw Scan</th>
                        </tr>
                    </thead>
                    <tbody id="result-table-data">
                        <!-- Data rows will be inserted here -->
                    </tbody>
                </table>
            </div>

            <!-- Delivery Note Section -->
            <div>
                <div class="header delivery-note-header">
                    <div>
                        <span>Len</span>
                        <input id="input-id-number-length" type="number" class="input-number">
                    </div>
                    <div>
                        <span>Thr</span>
                        <input id="input-scan-threshold" type="number" class="input-number">
                    </div>
                    <span id="delivery-note-progress">Progress: 0/0</span>
                    <!-- <span class="delivery-note-title">Delivery Note Section</span> -->
                </div>

                <div class="delivery-note-menu menu">
                    <button id="load-delivery-note">Load Delivery Note</button>
                    <input id="input-delimiter-delivery" type="text" class="input-delimiter">
                    <input id="delivery-note-section" type="text" placeholder="Delivery Note Id's...">
                </div>

                <table id="delivery-note-table" class="content">
                    <thead>
                        <tr>
                            <th>Index</th>
                            <th>V Index</th>
                            <th>ID Number</th>
                            <th>Found?</th>
                            <th>Raw Data</th>
                        </tr>
                    </thead>
                    <tbody id="delivery-note-table-data">
                        <!-- Delivery note data rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <div class="legend">
            <span class="legend-label">Legend:</span>
            <div class="legend-item">
                <span class="legend-color error"></span>
                <span class="legend-text">Error</span>
            </div>
            <div class="legend-item">
                <span class="legend-color duplicate"></span>
                <span class="legend-text">Duplicate</span>
            </div>
        </div>

        <div class="footer-links">
            <div class="footer-link">
                <img class="footer-icon" src="https://cdn.jsdelivr.net/gh/selfhst/icons@main/webp/github.webp"
                    alt="GitHub Logo">
                <a class="footer-link" href="https://github.com/NRG-Drink/verwo-logistics-scan-me" target="_blank"
                    rel="noopener noreferrer">
                    GitHub Repository
                </a>
            </div>
            <div class="footer-link">
                <img class="footer-icon" src="https://avatars.githubusercontent.com/u/123409068?v=4"
                    alt="Developer Image">
                <a href="https://github.com/NRG-Drink" target="_blank" rel="noopener noreferrer">
                    Developer
                </a>
            </div>
        </div>
    </footer>
</body>

</html>
